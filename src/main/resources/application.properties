server.port=8090
spring.application.name=spring-openai
logging.pattern.console=%green(%d{HH:mm:ss.SS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
spring.ai.openai.api-key=${OPENAI_API_KEY}
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG

spring.datasource.url=jdbc:h2:file:~/chatmemory;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=monir
spring.datasource.password=12345

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema/schema-h2db.sql